<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KitchenSync Remote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/remote.css">
</head>
<body>
    <header>
        <h1>KitchenSync Remote</h1>
    </header>

    <main>
        <!-- Left Pane: Video and Primary Controls -->
        <div class="playback-pane">
            <div class="video-container">
                <video id="preview" controls muted playsinline loop></video>
            </div>

            <div class="transport-controls">
                <div class="status-bar" id="clusterStatus">
                    Initializing...
                </div>

                <div class="control-group">
                    <label for="videoSelector">Active Video:</label>
                    <select id="videoSelector"></select>
                    
                    <button class="primary" onclick="playCluster()">PLAY CLUSTER</button>
                    <button onclick="stopCluster()">STOP ALL</button>
                </div>
            </div>
        </div>

        <!-- Right Pane: Device List and Configuration -->
        <div class="config-pane">
            <h2>Cluster Nodes</h2>
            <div id="deviceList" class="device-list">
                <!-- Device cards will be injected here -->
                <div class="message info">Scanning for devices...</div>
            </div>
        </div>
    </main>

    <datalist id="videoSuggestions"></datalist>
    <datalist id="scheduleSuggestions"></datalist>

    <script src="/static/js/remote.js?v=5"></script>
</body>
</html>
