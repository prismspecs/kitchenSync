<!DOCTYPE html>
<html>
<head>
    <title>kSync Remote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/remote.css?v=3">
</head>
<body>
    <h1>kSync Remote</h1>

    <main>
        <div class="left-pane">
            <div class="section">
                <h2>Cluster Control</h2>
                <div class="row">
                    <label for="videoSelector">Video file</label>
                    <select id="videoSelector"></select>
                </div>
                <div class="row control-buttons">
                    <button onclick="playCluster()">Play cluster</button>
                    <button onclick="stopCluster()">Stop all</button>
                    <button onclick="assignVideoToAllCollaborators()">Assign video to all</button>
                </div>
                <div class="status" id="clusterStatus">Loading...</div>
                <div class="row upload-row">
                    <label>Upload to Leader</label>
                    <input type="file" id="mediaUploadInput">
                    <button onclick="uploadMedia()">Upload</button>
                    <div id="uploadStatus"></div>
                </div>
                <video id="preview" controls muted playsinline loop></video>
            </div>
        </div>

        <div class="right-pane">
            <div class="section">
                <h2>Device Config</h2>
                <table>
                    <colgroup>
                        <col class="device-summary-cell">
                        <col class="config-cell">
                        <col class="media-cell">
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="device-summary-cell">Device Summary</th>
                            <th class="config-cell">Config</th>
                            <th class="media-cell">Media</th>
                        </tr>
                    </thead>
                    <tbody id="deviceRows"></tbody>
                </table>
            </div>
        </div>
    </main>

    <datalist id="videoSuggestions"></datalist>
    <datalist id="scheduleSuggestions"></datalist>

    <!-- Log Modal -->
    <div id="logModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="logModalTitle">Device Logs</h3>
                <span class="close-modal" onclick="closeLogModal()">&times;</span>
            </div>
            <pre id="logModalBody" class="log-view">Loading...</pre>
            <div class="modal-footer">
                <button onclick="refreshLogs()">Refresh</button>
                <button onclick="closeLogModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="/static/js/remote.js?v=9"></script>
</body>
</html>
